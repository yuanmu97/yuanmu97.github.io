<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Redirect…</title>
    <link rel="icon" href="../imgs/favicon.png">
    <script>
      (function () {
        var id = new URLSearchParams(location.search).get("id");
        if (id) {
          location.replace(
            "post/" + encodeURIComponent(id) + ".html"
          );
        } else {
          location.replace("index.html");
        }
      })();
    </script>
  </head>
  <body>
    <p>若未自动跳转，请<a href="index.html">返回博客列表</a>。</p>
  </body>
</html>
